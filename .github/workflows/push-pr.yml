name: Push and PR
on:
  push:
    branches: 
      - main
      - 'release/**'
    paths:
        - "src/**"
  pull_request:
    branches: 
      - main
      - 'release/**'
    paths:
        - "src/**"
jobs:
    run-tests:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v4
            - name: run tests
              run: npm run test
              

  